<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bulk Gmail Link Generator</title>
    <style>
      label { display:block; margin-top:8px; }
      textarea { width:100%; height:160px; }
      input[type="text"], input[type="number"] { width:100%; }
      .small { font-size:0.9em; color:#555; }
    </style>
  </head>
  <body>
    <h1>Bulk Gmail Link Generator</h1>
    <form action="/generate" method="post">
      <label>Sender email (info): <input type="text" name="sender" placeholder="optional - user must select this in Gmail" /></label>
      <label>Title (UI only): <input type="text" name="title" /></label>
      <label>Subject: <input type="text" name="subject" /></label>
      <label>Body: <textarea name="body"></textarea></label>
      <label>Recipient emails (one per line, or comma/semicolon separated):</label>
      <textarea name="receivers" placeholder="alice@example.com&#10;bob@example.com"></textarea>
      <label>Batch size (how many recipients per generated link): <input type="number" name="batch_size" value="100" /></label>
      <div class="small">Notes: We put the first recipient into "To" and the rest into BCC for privacy. The sender field cannot be forced by the link reliably.</div>
      <button type="submit">Generate links</button>
    </form>
  </body>
</html>
